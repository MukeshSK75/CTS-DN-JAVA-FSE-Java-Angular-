<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event List</title>
  <style>
    body { font-family: Georgia, serif; background: #f7f3ee; padding: 30px; }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    .event { background: #fff; border-left: 4px solid #2c3e50; padding: 14px 20px; margin-bottom: 12px; border-radius: 5px; box-shadow: 0 1px 5px rgba(0,0,0,0.07); }
    .event h3 { margin-bottom: 4px; color: #333; }
    .event p { color: #666; font-size: 0.9rem; }
    .err { color: red; background: #fff0f0; padding: 12px; border-radius: 5px; }
  </style>
</head>
<body>
  <h2>Upcoming Events</h2>
  <div id="list"></div>
  <script src="main.js"></script>
</body>
</html>
