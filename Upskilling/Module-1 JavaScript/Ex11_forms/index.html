<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #f5f0eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .form-box { background: #fff; padding: 36px 40px; border-radius: 10px; box-shadow: 0 3px 14px rgba(0,0,0,0.1); width: 100%; max-width: 440px; }
    h2 { color: #2c3e50; margin-bottom: 24px; }
    label { display: block; font-size: 0.9rem; color: #444; margin-bottom: 4px; margin-top: 14px; }
    input, select { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; }
    input.err-field { border-color: #e74c3c; }
    .err-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 4px; display: none; }
    button[type="submit"] { margin-top: 20px; width: 100%; background: #2c3e50; color: #fff; border: none; padding: 11px; border-radius: 5px; font-size: 1rem; cursor: pointer; }
    #success { display: none; margin-top: 14px; background: #eafaf1; color: #27ae60; padding: 12px; border-radius: 5px; text-align: center; }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Event Registration</h2>
    <form id="regForm">
      <label>Full Name</label>
      <input type="text" name="uname" id="uname" placeholder="Your name" />
      <div class="err-msg" id="nameErr">Name is required</div>

      <label>Email</label>
      <input type="email" name="email" id="email" placeholder="you@email.com" />
      <div class="err-msg" id="emailErr">Valid email required</div>

      <label>Select Event</label>
      <select name="event" id="evSel">
        <option value="">-- Pick an event --</option>
        <option value="jazz">Jazz Night</option>
        <option value="food">Food Fest</option>
        <option value="yoga">Morning Yoga</option>
      </select>
      <div class="err-msg" id="evErr">Please select an event</div>

      <button type="submit">Register</button>
    </form>
    <div id="success"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
