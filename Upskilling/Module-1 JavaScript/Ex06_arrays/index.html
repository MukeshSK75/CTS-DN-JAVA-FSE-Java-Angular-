<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Array Methods</title>
  <style>
    body { font-family: Georgia, serif; background: #eef2f7; padding: 30px; }
    h2 { color: #1a252f; margin-bottom: 10px; }
    .btns { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    button { background: #2c3e50; color: #fff; border: none; padding: 9px 18px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d5166; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .item { background: #fff; padding: 16px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.08); color: #333; font-size: 0.95rem; }
    .item span { display: block; font-weight: bold; margin-bottom: 4px; color: #2c3e50; }
  </style>
</head>
<body>
  <h2>Community Events</h2>
  <div class="btns">
    <button onclick="addNew()">Add Event</button>
    <button onclick="showMusic()">Music Only</button>
    <button onclick="showAll()">Show All</button>
  </div>
  <div class="grid" id="grid"></div>
  <script src="main.js"></script>
</body>
</html>
