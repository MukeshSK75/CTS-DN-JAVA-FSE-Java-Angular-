<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Debugging Demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #f5f0eb; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .box { background: #fff; padding: 36px 40px; border-radius: 10px; box-shadow: 0 3px 14px rgba(0,0,0,0.1); width: 100%; max-width: 460px; }
    h2 { color: #2c3e50; margin-bottom: 22px; }
    label { display: block; font-size: 0.9rem; color: #444; margin-bottom: 4px; margin-top: 12px; }
    input { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; }
    .btns { display: flex; gap: 10px; margin-top: 18px; }
    button { flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
    #regBtn { background: #2c3e50; color: #fff; }
    #bugBtn { background: #e74c3c; color: #fff; }
    #logBox { margin-top: 18px; background: #1a1a2e; color: #00ff88; padding: 14px; border-radius: 6px; font-family: monospace; font-size: 0.82rem; min-height: 80px; white-space: pre-wrap; }
    #status { margin-top: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Debugging Registration</h2>
    <label>Name</label>
    <input type="text" id="nm" placeholder="Your name" />
    <label>Email</label>
    <input type="email" id="em" placeholder="you@email.com" />
    <div class="btns">
      <button id="regBtn" onclick="tryRegister()">Register (Working)</button>
      <button id="bugBtn" onclick="buggyRegister()">Trigger Bug</button>
    </div>
    <div id="logBox">// Console logs will appear here...\n</div>
    <div id="status"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
