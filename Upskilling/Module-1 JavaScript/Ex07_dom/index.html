<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Manipulation</title>
  <style>
    body { font-family: Georgia, serif; background: #f5f0eb; padding: 30px; }
    h2 { color: #2c3e50; margin-bottom: 20px; }
    #container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .ev-card { background: #fff; padding: 18px 22px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.09); }
    .ev-card h3 { margin-bottom: 6px; color: #1a252f; font-size: 1rem; }
    .ev-card p { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
    .ev-card button { background: #2c3e50; color: #fff; border: none; padding: 7px 14px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .ev-card button:hover { background: #e74c3c; }
    .ev-card.done { opacity: 0.4; pointer-events: none; }
  </style>
</head>
<body>
  <h2>All Events</h2>
  <div id="container"></div>
  <script src="main.js"></script>
</body>
</html>
