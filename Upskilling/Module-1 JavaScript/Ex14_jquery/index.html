<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jQuery Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <style>
    body { font-family: Georgia, serif; background: #eef2f7; padding: 30px; }
    h2 { color: #1a252f; margin-bottom: 20px; }
    .top { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    button { background: #2c3e50; color: #fff; border: none; padding: 9px 18px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3d5166; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .ev-card { background: #fff; padding: 18px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .ev-card h3 { color: #2c3e50; margin-bottom: 6px; font-size: 0.95rem; }
    .ev-card p { color: #777; font-size: 0.85rem; margin-bottom: 10px; }
    .ev-card .regBtn { width: 100%; }
    .note { margin-top: 26px; background: #fff; padding: 16px 20px; border-left: 4px solid #2c3e50; border-radius: 5px; color: #444; font-size: 0.9rem; line-height: 1.6; }
    .note strong { color: #2c3e50; }
  </style>
</head>
<body>
  <h2>jQuery Event Portal</h2>
  <div class="top">
    <button id="hideAll">Hide All Cards</button>
    <button id="showAll">Show All Cards</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="note">
    <strong>Why React/Vue over jQuery?</strong> jQuery works well for small DOM tasks, but as the app grows, managing state manually becomes messy. React and Vue offer component-based architecture, reactive data binding, and better tooling — making large apps easier to scale and maintain.
  </div>
  <script src="main.js"></script>
</body>
</html>
