<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Four Equal Columns</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-box {
      background: #0dcaf0;
      color: #000;
      padding: 40px 10px;
      text-align: center;
      border-radius: 6px;
      font-weight: 600;
    }
    .col-box:nth-child(2) { background: #ffc107; }
    .col-box:nth-child(3) { background: #198754; color:#fff; }
    .col-box:nth-child(4) { background: #6f42c1; color:#fff; }
  </style>
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Four Equal Columns (col-sm-3)</h4>

  <div class="row g-3">
    <div class="col-sm-3"><div class="col-box">Column 1</div></div>
    <div class="col-sm-3"><div class="col-box">Column 2</div></div>
    <div class="col-sm-3"><div class="col-box">Column 3</div></div>
    <div class="col-sm-3"><div class="col-box">Column 4</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
