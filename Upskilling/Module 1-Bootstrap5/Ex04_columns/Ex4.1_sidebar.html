<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar { background: #212529; color: #fff; min-height: 80vh; padding: 24px 16px; border-radius: 8px; }
    .sidebar a { color: #adb5bd; display: block; padding: 8px 0; text-decoration: none; }
    .sidebar a:hover { color: #fff; }
    .content { background: #f8f9fa; min-height: 80vh; padding: 24px; border-radius: 8px; }
  </style>
</head>
<body>

<div class="container mt-4">
  <div class="row g-3">

    <div class="col-md-3">
      <div class="sidebar">
        <h6 class="text-uppercase text-secondary mb-3" style="font-size:.75rem;letter-spacing:.08em;">Menu</h6>
        <a href="#">🏠 Dashboard</a>
        <a href="#">📊 Analytics</a>
        <a href="#">🛒 Orders</a>
        <a href="#">👤 Profile</a>
        <a href="#">⚙️ Settings</a>
      </div>
    </div>

    <div class="col-md-9">
      <div class="content">
        <h3>Main Content Area</h3>
        <p class="text-muted">This is the content area using <code>col-md-9</code>. It takes up 9 of 12 columns on medium+ screens.</p>
        <div class="row g-3 mt-2">
          <div class="col-sm-4"><div class="card text-center p-3"><h5>120</h5><small class="text-muted">Orders</small></div></div>
          <div class="col-sm-4"><div class="card text-center p-3"><h5>$4,200</h5><small class="text-muted">Revenue</small></div></div>
          <div class="col-sm-4"><div class="card text-center p-3"><h5>89%</h5><small class="text-muted">Satisfaction</small></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
