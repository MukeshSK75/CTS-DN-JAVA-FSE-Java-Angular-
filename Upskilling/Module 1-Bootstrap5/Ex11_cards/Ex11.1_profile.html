<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .card { border: none; border-radius: 16px; overflow: hidden; }
    .card-img-top { height: 200px; object-fit: cover; }
    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-top: -40px;
      object-fit: cover;
    }
    .stat { text-align: center; }
    .stat h6 { margin-bottom: 2px; font-size: 1.1rem; }
    .stat small { color: #6c757d; font-size: .75rem; }
  </style>
</head>
<body>

<div class="container mt-5 d-flex justify-content-center">
  <div class="card shadow" style="width:340px;">

    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=700&q=80"
         class="card-img-top" alt="cover">

    <div class="card-body text-center">
      <img src="https://i.pravatar.cc/150?img=23" class="avatar d-block mx-auto mb-3" alt="avatar">

      <h5 class="card-title mb-0">Sarah Helen</h5>
      <p class="text-muted small mb-3">UI/UX Designer · San Francisco</p>

      <p class="card-text text-muted" style="font-size:.9rem;">
        Passionate about crafting clean, user-centered digital experiences.
      </p>

      <div class="d-flex justify-content-around my-3 py-3 border-top border-bottom">
        <div class="stat"><h6>248</h6><small>Posts</small></div>
        <div class="stat"><h6>14.2k</h6><small>Followers</small></div>
        <div class="stat"><h6>312</h6><small>Following</small></div>
      </div>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary flex-grow-1">Follow</button>
        <button class="btn btn-outline-secondary flex-grow-1">Message</button>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
