<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Border Utilities</h4>

  <div class="row g-4 align-items-center text-center">

    <div class="col-6 col-md-3">
      <img src="https://i.pravatar.cc/120?img=1" width="100" height="100"
           class="border border-primary border-3 rounded" alt="">
      <p class="mt-2 small text-muted">border border-primary border-3 rounded</p>
    </div>

    <div class="col-6 col-md-3">
      <img src="https://i.pravatar.cc/120?img=2" width="100" height="100"
           class="border border-success border-3 rounded-circle" alt="">
      <p class="mt-2 small text-muted">rounded-circle</p>
    </div>

    <div class="col-6 col-md-3">
      <img src="https://i.pravatar.cc/120?img=3" width="100" height="100"
           class="border border-danger border-3 rounded-pill" alt="">
      <p class="mt-2 small text-muted">rounded-pill</p>
    </div>

    <div class="col-6 col-md-3">
      <img src="https://i.pravatar.cc/120?img=4" width="100" height="100"
           class="border border-warning border-3 rounded-0" alt="">
      <p class="mt-2 small text-muted">border-warning rounded-0</p>
    </div>

  </div>

  <hr class="my-5">
  <h5 class="mb-3">Border on divs</h5>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="border border-primary p-3 rounded">border-primary</div>
    </div>
    <div class="col-md-4">
      <div class="border border-top border-primary border-3 p-3">border-top border-3</div>
    </div>
    <div class="col-md-4">
      <div class="border-0 p-3 bg-light rounded">border-0 (no border)</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
