<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap JS Bundle</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h2 class="mb-4">Bootstrap JS Plugins via bundle.min.js</h2>
  <p class="text-muted mb-4">The <code>bootstrap.bundle.min.js</code> includes Popper.js, enabling dropdowns, tooltips, and modals out of the box.</p>

  <div class="d-flex gap-3 flex-wrap">

    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demo">
      Open Modal
    </button>

    <div class="dropdown">
      <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
        Dropdown
      </button>
      <ul class="dropdown-menu">
        <li><a class="dropdown-item" href="#">Option 1</a></li>
        <li><a class="dropdown-item" href="#">Option 2</a></li>
        <li><a class="dropdown-item" href="#">Option 3</a></li>
      </ul>
    </div>

    <button type="button" class="btn btn-info" data-bs-toggle="tooltip" title="JS bundle enabled this!">
      Hover for Tooltip
    </button>

  </div>
</div>

<div class="modal fade" id="demo" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Modal Works!</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Bootstrap JS bundle loaded successfully. Popper.js is bundled in.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  var tips = document.querySelectorAll('[data-bs-toggle="tooltip"]');
  tips.forEach(function(el) {
    new bootstrap.Tooltip(el);
  });
</script>
</body>
</html>
