<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacing Utilities</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .show-box { background: #cfe2ff; border: 2px dashed #0d6efd; }
    .inner { background: #0d6efd; color: #fff; font-size: .8rem; text-align: center; }
  </style>
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Margin &amp; Padding Utilities</h4>

  <h6 class="text-muted">m-3 (margin all sides)</h6>
  <div class="show-box d-inline-block mb-4">
    <div class="inner m-3 p-2">m-3</div>
  </div>

  <h6 class="text-muted">mt-4 (margin top)</h6>
  <div class="show-box d-inline-block mb-4">
    <div class="inner mt-4 p-2">mt-4</div>
  </div>

  <h6 class="text-muted">p-2 (padding all sides)</h6>
  <div class="show-box d-inline-block mb-4">
    <div class="inner p-2">p-2</div>
  </div>

  <h6 class="text-muted">py-5 (padding top + bottom)</h6>
  <div class="show-box d-block mb-4">
    <div class="inner py-5">py-5</div>
  </div>

  <hr>
  <h5 class="mt-4 mb-3">All spacing scale (1–5)</h5>
  <div class="d-flex flex-wrap gap-2 mb-4">
    <div class="bg-primary text-white p-1 rounded">p-1</div>
    <div class="bg-primary text-white p-2 rounded">p-2</div>
    <div class="bg-primary text-white p-3 rounded">p-3</div>
    <div class="bg-primary text-white p-4 rounded">p-4</div>
    <div class="bg-primary text-white p-5 rounded">p-5</div>
  </div>

  <div class="d-flex flex-wrap">
    <div class="bg-success text-white p-2 rounded m-1">m-1</div>
    <div class="bg-success text-white p-2 rounded m-2">m-2</div>
    <div class="bg-success text-white p-2 rounded m-3">m-3</div>
    <div class="bg-success text-white p-2 rounded m-4">m-4</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
