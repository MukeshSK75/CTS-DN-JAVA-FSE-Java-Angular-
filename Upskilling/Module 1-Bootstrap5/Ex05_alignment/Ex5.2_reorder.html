<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Reordering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box { padding: 30px; border-radius: 6px; text-align: center; font-weight: 600; }
  </style>
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-2">Column Reordering with order-md-*</h4>
  <p class="text-muted mb-4">On desktop: "Second in HTML" appears first visually. On mobile: HTML order is kept.</p>

  <div class="row g-3">
    <div class="col-12 col-md-4 order-md-2">
      <div class="box bg-warning">
        <div class="badge bg-dark mb-2">HTML order: 1st</div><br>
        Displayed 2nd on desktop<br>
        <small class="text-muted">(order-md-2)</small>
      </div>
    </div>
    <div class="col-12 col-md-4 order-md-1">
      <div class="box bg-success text-white">
        <div class="badge bg-light text-dark mb-2">HTML order: 2nd</div><br>
        Displayed 1st on desktop<br>
        <small style="opacity:.8">(order-md-1)</small>
      </div>
    </div>
    <div class="col-12 col-md-4 order-md-3">
      <div class="box bg-primary text-white">
        <div class="badge bg-light text-dark mb-2">HTML order: 3rd</div><br>
        Stays 3rd on desktop<br>
        <small style="opacity:.8">(order-md-3)</small>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
