<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Center Alignment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .demo-row {
      background: #e9ecef;
      border-radius: 8px;
      min-height: 140px;
    }
    .box {
      background: #0d6efd;
      color: #fff;
      padding: 20px 28px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">justify-content-center + align-items-center</h4>

  <div class="row justify-content-center align-items-center demo-row g-3">
    <div class="col-auto"><div class="box">Box A</div></div>
    <div class="col-auto"><div class="box">Box B</div></div>
    <div class="col-auto"><div class="box">Box C</div></div>
  </div>

  <h5 class="mt-5 mb-3">Other justify-content variants</h5>

  <p class="fw-semibold">justify-content-start</p>
  <div class="row justify-content-start demo-row align-items-center g-2 mb-3">
    <div class="col-2"><div class="box text-center">1</div></div>
    <div class="col-2"><div class="box text-center">2</div></div>
  </div>

  <p class="fw-semibold">justify-content-end</p>
  <div class="row justify-content-end demo-row align-items-center g-2 mb-3">
    <div class="col-2"><div class="box text-center">1</div></div>
    <div class="col-2"><div class="box text-center">2</div></div>
  </div>

  <p class="fw-semibold">justify-content-between</p>
  <div class="row justify-content-between demo-row align-items-center g-2">
    <div class="col-2"><div class="box text-center">1</div></div>
    <div class="col-2"><div class="box text-center">2</div></div>
    <div class="col-2"><div class="box text-center">3</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
