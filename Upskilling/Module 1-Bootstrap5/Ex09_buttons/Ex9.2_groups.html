<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Groups</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Button Groups</h4>

  <h6 class="text-muted mb-2">Basic btn-group</h6>
  <div class="btn-group mb-4" role="group">
    <button class="btn btn-primary">Left</button>
    <button class="btn btn-primary">Center</button>
    <button class="btn btn-primary">Right</button>
  </div>

  <br>

  <h6 class="text-muted mb-2">Outline Group</h6>
  <div class="btn-group mb-4" role="group">
    <button class="btn btn-outline-secondary">Day</button>
    <button class="btn btn-outline-secondary">Week</button>
    <button class="btn btn-outline-secondary">Month</button>
    <button class="btn btn-outline-secondary">Year</button>
  </div>

  <br>

  <h6 class="text-muted mb-2">Vertical Group</h6>
  <div class="btn-group-vertical mb-4">
    <button class="btn btn-outline-dark">Top</button>
    <button class="btn btn-outline-dark">Middle</button>
    <button class="btn btn-outline-dark">Bottom</button>
  </div>

  <h6 class="text-muted mb-2 mt-2">Checkbox Toggle Buttons</h6>
  <div class="btn-group mb-4" role="group">
    <input type="checkbox" class="btn-check" id="bold" autocomplete="off">
    <label class="btn btn-outline-primary" for="bold"><strong>B</strong></label>

    <input type="checkbox" class="btn-check" id="italic" autocomplete="off">
    <label class="btn btn-outline-primary" for="italic"><em>I</em></label>

    <input type="checkbox" class="btn-check" id="under" autocomplete="off">
    <label class="btn btn-outline-primary" for="under"><u>U</u></label>
  </div>

  <h6 class="text-muted mb-2">Radio Toggle Buttons</h6>
  <div class="btn-group" role="group">
    <input type="radio" class="btn-check" name="size" id="sm" autocomplete="off">
    <label class="btn btn-outline-success" for="sm">S</label>

    <input type="radio" class="btn-check" name="size" id="md" autocomplete="off" checked>
    <label class="btn btn-outline-success" for="md">M</label>

    <input type="radio" class="btn-check" name="size" id="lg" autocomplete="off">
    <label class="btn btn-outline-success" for="lg">L</label>

    <input type="radio" class="btn-check" name="size" id="xl" autocomplete="off">
    <label class="btn btn-outline-success" for="xl">XL</label>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
