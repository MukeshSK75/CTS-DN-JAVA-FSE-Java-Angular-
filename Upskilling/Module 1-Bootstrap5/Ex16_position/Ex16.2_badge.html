<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Overlay</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Badge Overlay with position-relative &amp; position-absolute</h4>

  <div class="row g-4">

    <div class="col-6 col-md-3">
      <div class="position-relative d-inline-block">
        <img src="https://picsum.photos/seed/p1/180/180" class="rounded" width="160" height="160" alt="">
        <span class="position-absolute top-0 end-0 badge bg-danger rounded-pill">NEW</span>
      </div>
      <p class="mt-2 small text-muted">top-0 end-0</p>
    </div>

    <div class="col-6 col-md-3">
      <div class="position-relative d-inline-block">
        <img src="https://picsum.photos/seed/p2/180/180" class="rounded" width="160" height="160" alt="">
        <span class="position-absolute top-0 start-0 badge bg-success">SALE</span>
      </div>
      <p class="mt-2 small text-muted">top-0 start-0</p>
    </div>

    <div class="col-6 col-md-3">
      <div class="position-relative d-inline-block">
        <img src="https://picsum.photos/seed/p3/180/180" class="rounded" width="160" height="160" alt="">
        <span class="position-absolute bottom-0 start-0 badge bg-warning text-dark w-100 text-center rounded-0 rounded-bottom">Limited</span>
      </div>
      <p class="mt-2 small text-muted">bottom-0 start-0 full width</p>
    </div>

    <div class="col-6 col-md-3">
      <div class="position-relative d-inline-block">
        <img src="https://picsum.photos/seed/p4/180/180" class="rounded-circle" width="160" height="160" alt="">
        <span class="position-absolute bottom-0 end-0 bg-success rounded-circle border border-2 border-white"
              style="width:20px;height:20px;"></span>
      </div>
      <p class="mt-2 small text-muted">Online indicator dot</p>
    </div>

  </div>

  <hr class="my-5">
  <h5 class="mb-3">Product Card with overlay badge</h5>
  <div class="row g-3">
    <div class="col-md-3 col-sm-6" style="max-width:220px;">
      <div class="card border-0 shadow-sm">
        <div class="position-relative">
          <img src="https://picsum.photos/seed/shoe/300/200" class="card-img-top rounded-top" alt="">
          <span class="position-absolute top-0 start-0 badge bg-danger m-2">-30%</span>
          <span class="position-absolute top-0 end-0 badge bg-dark m-2">HOT</span>
        </div>
        <div class="card-body px-3 py-2">
          <h6 class="mb-0">Running Shoe</h6>
          <div class="d-flex gap-2 align-items-center mt-1">
            <span class="fw-bold text-danger">$69</span>
            <small class="text-muted text-decoration-line-through">$99</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
