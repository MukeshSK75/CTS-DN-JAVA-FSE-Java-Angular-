<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Icon-Only Buttons with Bootstrap Icons</h4>

  <h6 class="text-muted mb-2">Basic icon buttons</h6>
  <div class="d-flex gap-2 flex-wrap mb-4">
    <button class="btn btn-primary" title="Home"><i class="bi bi-house-fill"></i></button>
    <button class="btn btn-success" title="Add"><i class="bi bi-plus-lg"></i></button>
    <button class="btn btn-danger" title="Delete"><i class="bi bi-trash3-fill"></i></button>
    <button class="btn btn-warning" title="Edit"><i class="bi bi-pencil-fill"></i></button>
    <button class="btn btn-info" title="Download"><i class="bi bi-download"></i></button>
    <button class="btn btn-secondary" title="Settings"><i class="bi bi-gear-fill"></i></button>
    <button class="btn btn-dark" title="Search"><i class="bi bi-search"></i></button>
  </div>

  <h6 class="text-muted mb-2">Outline icon buttons</h6>
  <div class="d-flex gap-2 flex-wrap mb-4">
    <button class="btn btn-outline-primary" title="Like"><i class="bi bi-heart"></i></button>
    <button class="btn btn-outline-danger" title="Liked"><i class="bi bi-heart-fill"></i></button>
    <button class="btn btn-outline-secondary" title="Share"><i class="bi bi-share"></i></button>
    <button class="btn btn-outline-dark" title="Bookmark"><i class="bi bi-bookmark"></i></button>
    <button class="btn btn-outline-success" title="Check"><i class="bi bi-check-circle"></i></button>
    <button class="btn btn-outline-info" title="Info"><i class="bi bi-info-circle"></i></button>
  </div>

  <h6 class="text-muted mb-2">Sized icon buttons</h6>
  <div class="d-flex align-items-center gap-2 mb-5">
    <button class="btn btn-primary btn-lg"><i class="bi bi-send-fill"></i></button>
    <button class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
    <button class="btn btn-primary btn-sm"><i class="bi bi-send-fill"></i></button>
  </div>

  <h6 class="text-muted mb-3">Toolbar example (replaced text → icons)</h6>
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Document Editor</span>
      <div class="btn-group">
        <button class="btn btn-sm btn-outline-secondary" title="Bold"><i class="bi bi-type-bold"></i></button>
        <button class="btn btn-sm btn-outline-secondary" title="Italic"><i class="bi bi-type-italic"></i></button>
        <button class="btn btn-sm btn-outline-secondary" title="Underline"><i class="bi bi-type-underline"></i></button>
      </div>
      <div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-secondary" title="Undo"><i class="bi bi-arrow-counterclockwise"></i></button>
        <button class="btn btn-sm btn-outline-secondary" title="Redo"><i class="bi bi-arrow-clockwise"></i></button>
        <button class="btn btn-sm btn-success" title="Save"><i class="bi bi-floppy-fill"></i></button>
      </div>
    </div>
    <div class="card-body">
      <textarea class="form-control border-0" rows="4" placeholder="Start typing..."></textarea>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
