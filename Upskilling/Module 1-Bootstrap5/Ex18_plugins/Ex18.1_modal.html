<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Modal Popup — Bootstrap JS Plugin</h4>

  <div class="d-flex gap-3 flex-wrap">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#basic">Basic Modal</button>
    <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#confirm">Confirm Delete</button>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#form">Form Modal</button>
  </div>
</div>

<div class="modal fade" id="basic" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Modal Title</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p>This is a basic Bootstrap 5 modal triggered by a button click using <code>data-bs-toggle="modal"</code>.</p>
        <p class="mb-0 text-muted small">No extra JavaScript needed — Bootstrap handles all the show/hide logic.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="confirm" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-body text-center py-4">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem;"></i>
        <h5 class="mt-3 mb-1">Delete Item?</h5>
        <p class="text-muted small mb-4">This action cannot be undone.</p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-danger btn-sm" data-bs-dismiss="modal">Yes, Delete</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="form" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title">Add New User</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0">
        <div class="mb-3">
          <label class="form-label small fw-semibold">Full Name</label>
          <input type="text" class="form-control" placeholder="John Doe">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Email</label>
          <input type="email" class="form-control" placeholder="john@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Role</label>
          <select class="form-select">
            <option>Admin</option>
            <option>Editor</option>
            <option>Viewer</option>
          </select>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success">Add User</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
