<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .nav-bar {
      background: #212529;
      padding: 14px 20px;
      border-radius: 8px;
    }
    .nav-bar a {
      color: #adb5bd;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background .2s;
    }
    .nav-bar a:hover { background: #343a40; color: #fff; }
    .brand { color: #fff; font-weight: 700; font-size: 1.2rem; }
  </style>
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Responsive Navbar — d-flex flex-column flex-md-row</h4>

  <div class="nav-bar d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
    <span class="brand">🚀 MyBrand</span>

    <div class="d-flex flex-column flex-md-row gap-1">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>

    <button class="btn btn-sm btn-outline-light">Login</button>
  </div>

  <div class="alert alert-info mt-4">
    Resize the window: on mobile the links stack vertically (<code>flex-column</code>); on md+ they go horizontal (<code>flex-md-row</code>).
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
