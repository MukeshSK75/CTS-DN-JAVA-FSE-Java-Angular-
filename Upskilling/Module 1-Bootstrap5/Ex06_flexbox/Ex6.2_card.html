<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Card Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <h4 class="mb-4">Card with justify-content-between + align-items-center</h4>

  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-1">Product Name</h5>
        <small class="text-muted">Category: Electronics</small>
      </div>
      <span class="badge bg-success fs-6">$49.99</span>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-body d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3">
        <div class="bg-primary text-white rounded-circle d-flex justify-content-center align-items-center" style="width:48px;height:48px;font-size:1.2rem;">JD</div>
        <div>
          <h6 class="mb-0">John Doe</h6>
          <small class="text-muted">Admin</small>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-primary">Edit</button>
        <button class="btn btn-sm btn-outline-danger">Remove</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span class="fw-semibold">Notifications</span>
      <span class="badge bg-danger">5 new</span>
    </div>
    <ul class="list-group list-group-flush">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        New order received <span class="badge bg-primary">Order</span>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Server usage at 90% <span class="badge bg-warning text-dark">Alert</span>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Backup completed <span class="badge bg-success">Info</span>
      </li>
    </ul>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
