<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Local Files</title>
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
  <h2 class="mb-3">Bootstrap via Downloaded / npm Files</h2>
  <p class="text-muted">Bootstrap CSS is loaded from local <code>node_modules</code>.</p>

  <div class="alert alert-info">
    Run <strong>npm install bootstrap</strong> in this folder, then open this file via a local server.
  </div>

  <button class="btn btn-primary me-2">Primary</button>
  <button class="btn btn-outline-secondary">Secondary</button>
</div>

<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
