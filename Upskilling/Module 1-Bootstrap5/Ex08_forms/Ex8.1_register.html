<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h4 class="mb-1">Create Account</h4>
          <p class="text-muted mb-4 small">Fill in the details below to register.</p>

          <div class="row g-3">

            <div class="col-sm-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" placeholder="John">
            </div>
            <div class="col-sm-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" placeholder="Doe">
            </div>

            <div class="col-12">
              <label class="form-label">Email</label>
              <div class="input-group">
                <span class="input-group-text">@</span>
                <input type="email" class="form-control" placeholder="john@example.com">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Phone</label>
              <div class="input-group">
                <span class="input-group-text">+91</span>
                <input type="tel" class="form-control" placeholder="9876543210">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" placeholder="Min 8 characters">
            </div>

            <div class="col-12">
              <label class="form-label">Gender</label>
              <div class="d-flex gap-4">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="gender" id="male">
                  <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="gender" id="female">
                  <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="gender" id="other">
                  <label class="form-check-label" for="other">Other</label>
                </div>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Interests</label>
              <div class="d-flex gap-4 flex-wrap">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="tech">
                  <label class="form-check-label" for="tech">Technology</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="music">
                  <label class="form-check-label" for="music">Music</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="sports">
                  <label class="form-check-label" for="sports">Sports</label>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label" for="terms">
                  I agree to the <a href="#">Terms & Conditions</a>
                </label>
              </div>
            </div>

            <div class="col-12">
              <button class="btn btn-primary w-100">Register</button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
