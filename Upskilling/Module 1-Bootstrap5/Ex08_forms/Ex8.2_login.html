<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .login-card { max-width: 400px; }
  </style>
</head>
<body>

<div class="min-vh-100 d-flex align-items-center justify-content-center">
  <div class="login-card w-100 mx-3">
    <div class="card shadow border-0">
      <div class="card-body p-4">

        <h4 class="mb-1 text-center">Welcome back</h4>
        <p class="text-muted text-center small mb-4">Sign in to your account</p>

        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="name@example.com">
          <label for="email">Email address</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="pwd" placeholder="Password">
          <label for="pwd">Password</label>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <a href="#" class="small text-decoration-none">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100 py-2">Sign In</button>

        <hr class="my-3">

        <p class="text-center small mb-0">
          Don't have an account? <a href="#" class="text-decoration-none">Create one</a>
        </p>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
