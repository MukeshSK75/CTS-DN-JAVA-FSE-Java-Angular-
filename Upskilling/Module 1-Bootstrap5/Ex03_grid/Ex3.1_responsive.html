<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .box {
      background: #0d6efd;
      color: #fff;
      padding: 30px;
      text-align: center;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="container mt-5">
  <h3 class="mb-4">Responsive 3-Column Grid</h3>
  <p class="text-muted">Stacks on mobile · 2-per-row on tablet · 3-per-row on desktop</p>

  <div class="row g-3 mt-2">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="box">Column 1</div>
    </div>
    <div class="col-12 col-md-6 col-lg-4">
      <div class="box" style="background:#198754;">Column 2</div>
    </div>
    <div class="col-12 col-md-6 col-lg-4">
      <div class="box" style="background:#dc3545;">Column 3</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
